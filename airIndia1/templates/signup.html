{% extends 'menubar.html' %}

{% block content %}
<style>
    .auth-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        padding: 40px 15px;
    }
    .auth-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 450px;
        overflow: hidden;
    }
    .auth-header {
        background-color: var(--ai-red);
        color: white;
        padding: 30px 20px;
        text-align: center;
    }
    .auth-header h3 {
        font-weight: 700;
        margin: 0;
    }
    .auth-body {
        padding: 40px 30px;
    }
    .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 1px solid #ddd;
    }
    .btn-auth {
        background-color: var(--ai-dark);
        color: white;
        font-weight: 600;
        border-radius: 8px;
        padding: 12px;
        width: 100%;
        transition: all 0.3s;
    }
    .btn-auth:hover {
        background-color: var(--ai-red);
        color: white;
    }
    .error-msg {
        color: var(--ai-red);
        font-size: 0.9rem;
        margin-top: 15px;
        text-align: center;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h3><i class="fa-solid fa-user-plus mr-2"></i>Sign Up</h3>
            <p class="mb-0 mt-2 text-white-50">Join the Air India Family</p>
        </div>
        <div class="auth-body">
            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}
                <div class="form-group mb-3">
                    <label class="font-weight-bold text-muted">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group mb-3">
                    <label class="font-weight-bold text-muted">Username</label>
                    <input type="text" name="name" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="form-group mb-4">
                    <label class="font-weight-bold text-muted">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-auth">Create Account <i class="fa-solid fa-check ml-2"></i></button>
            </form>
            
            {% if error %}
            <div class="error-msg font-weight-bold">
                {{ error }}
            </div>
            {% endif %}

            <div class="text-center mt-4">
                <p class="text-muted">Already have an account? <a href="{% url 'signin' %}" class="text-danger font-weight-bold">Sign in here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
