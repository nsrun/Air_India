{% extends 'menubar.html' %}

{% block content %}
<style>
    .booking-wrapper {
        min-height: 80vh;
        background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), url('https://images.unsplash.com/photo-1542296332-2e4473faf563?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
        padding: 60px 15px;
    }
    .booking-card {
        background: white;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        max-width: 800px;
        margin: 0 auto;
        overflow: hidden;
    }
    .booking-header {
        background-color: var(--ai-red);
        color: white;
        padding: 30px;
        text-align: center;
    }
    .booking-body {
        padding: 40px;
    }
    .form-group label {
        font-weight: 600;
        color: var(--ai-dark);
        margin-bottom: 8px;
    }
    .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 1px solid #e0e0e0;
        height: auto;
        font-size: 1.1rem;
    }
    .form-control:focus {
        border-color: var(--ai-red);
        box-shadow: 0 0 0 0.2rem rgba(227, 24, 55, 0.25);
    }
    .btn-search {
        background-color: var(--ai-red);
        color: white;
        font-weight: 700;
        font-size: 1.2rem;
        padding: 15px;
        border-radius: 8px;
        border: none;
        width: 100%;
        transition: all 0.3s ease;
    }
    .btn-search:hover {
        background-color: var(--ai-red-hover);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(227, 24, 55, 0.3);
    }
    .error-msg {
        color: var(--ai-red);
        font-weight: bold;
        text-align: center;
        margin-top: 20px;
    }
</style>

<div class="booking-wrapper">
    <div class="booking-card">
        <div class="booking-header">
            <h2 class="mb-0"><i class="fa-solid fa-plane-departure mr-3"></i>Book Your Flight</h2>
            <p class="mb-0 mt-2 text-white-50">Search for the best fares to your destination</p>
        </div>
        <div class="booking-body">
            <form method="post" action="">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="form-group">
                            <label for="from"><i class="fa-solid fa-location-dot text-danger mr-2"></i>From</label>
                            <input type="text" id="from" name="from" class="form-control" placeholder="Origin City or Airport" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="form-group">
                            <label for="to"><i class="fa-solid fa-location-crosshairs text-danger mr-2"></i>To</label>
                            <input type="text" id="to" name="to" class="form-control" placeholder="Destination City or Airport" required>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="form-group">
                            <label for="departure"><i class="fa-regular fa-calendar-days text-danger mr-2"></i>Departure Date</label>
                            <input type="date" id="departure" name="departure" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-search">Search Flights <i class="fa-solid fa-magnifying-glass ml-2"></i></button>
                    </div>
                </div>
            </form>
            {% if error %}
            <div class="error-msg">
                <i class="fa-solid fa-circle-exclamation mr-2"></i>{{ error }}
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
